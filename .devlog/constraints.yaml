- id: constraint-2026-05-13-devlog-must-remain-local-first-with
  date: '2026-05-13'
  text: devlog must remain local-first with no database or required network service
  type: technical
  source: ROADMAP.md design principles
  impact: all state must be represented as files under .devlog/ plus generated local
    artifacts
- id: constraint-2026-05-13-generated-portfolio-tool-export-mus
  date: '2026-05-13'
  text: generated portfolio/tool export must stay inside .devlog/index.json
  type: convention
  source: user direction during v0.2 hardening
  impact: root DEVLOG.json is obsolete; external consumers should fetch .devlog/index.json
- id: constraint-2026-05-13-test-coverage-gate-must-run-through
  date: '2026-05-13'
  text: test coverage gate must run through pytest-cov with at least 80 percent total
    coverage
  type: convention
  source: v0.2 production hardening
  impact: new features need tests or the default pytest command fails
- id: constraint-2026-05-13-llm-features-must-gracefully-degrad
  date: '2026-05-13'
  text: LLM features must gracefully degrade to keyword matching when no provider
    is configured
  type: technical
  source: agent-bootstrap architecture discussion
  impact: tension overlap detection and ask queries cannot require network credentials
    or hosted AI availability
