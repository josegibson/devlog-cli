- id: call-2026-05-13-keep-generated-portfolio-export-ins
  date: '2026-05-13'
  text: Keep generated portfolio export inside .devlog/index.json
  context: root should stay clean; tools can fetch one pretty-printed index from the
    devlog state directory
  over: []
  status: accepted
  visibility: public
- id: call-2026-05-13-use-local-devlog-yaml-as-the-canoni
  date: '2026-05-13'
  text: Use local .devlog YAML as the canonical project state
  context: devlog is a meta state engine that must travel with cloned repos and work
    without external services
  facing: agents need durable situational awareness across sessions and providers
  over:
  - central portfolio repository
  - remote database
  - markdown-only project files
  to_achieve: local-first operation, readable diffs, and project state that travels
    with the code
  tradeoff: external portfolio consumers need a generated index rather than querying
    normalized storage
  status: accepted
  visibility: public
- id: call-2026-05-13-use-git-commits-as-the-audit-trail
  date: '2026-05-13'
  text: Use git commits as the audit trail for every devlog write
  context: devlog state is plain YAML and generated context files inside the project
    repo
  facing: state changes must be reviewable and attributable over time
  over:
  - append-only opaque logs
  - external audit database
  - uncommitted local state
  to_achieve: human-readable historical record through normal git tooling
  tradeoff: each CLI write creates commit noise that must be managed intentionally
  status: accepted
  visibility: public
- id: call-2026-05-13-derive-devlog-entry-schemas-from-es
  date: '2026-05-13'
  text: Derive devlog entry schemas from established frameworks
  context: agent drift is prevented by structured fields rather than vague command
    names
  facing: decisions, blockers, pivots, handoffs, goals, architecture, constraints,
    and debt need different semantics
  over:
  - free-form labels
  - invented taxonomy
  - unstructured notes only
  to_achieve: meaningful L1/L2/L3 project state that agents can interpret reliably
  tradeoff: the schema is richer than casual note taking and needs progressive disclosure
  status: accepted
  visibility: public
- id: call-2026-05-13-use-progressive-disclosure-for-the
  date: '2026-05-13'
  text: Use progressive disclosure for the CLI interface
  context: users and agents should get value from text-only commands while richer
    context remains available through flags
  facing: full schemas can create cognitive load if every field appears mandatory
  over:
  - mandatory full forms for every command
  - separate expert mode
  - schema-free commands
  to_achieve: day-one usability without losing structured meaning for advanced entries
  tradeoff: some entries will be sparse and AGENTS.md must degrade gracefully
  status: accepted
  visibility: public
- id: call-2026-05-13-use-final-v0-3-command-names-withou
  date: '2026-05-13'
  text: Use final v0.3 command names without deprecated aliases
  context: the tool has no external users yet and compatibility does not matter more
    than vocabulary clarity
  facing: v0.2 names mixed implementation labels with conceptual schema names
  over:
  - compatibility aliases
  - deprecation warnings
  - delaying the rename
  to_achieve: 'a clean command surface: note, call, calls, snag, clear, brief, log,
    orient, shift, arch, constraint, debt'
  tradeoff: local scripts using v0.2 command names will break
  status: accepted
  visibility: public
- id: call-2026-05-13-keep-the-python-package-at-the-repo
  date: '2026-05-13'
  text: Keep the Python package at the repository root as devlog
  context: the package is small and the user explicitly preferred not adding a src/devlog
    nesting layer
  facing: production packaging benefits from src layout but project simplicity matters
    now
  over:
  - src/devlog layout
  - package rename to src
  to_achieve: simple repository structure while retaining the import package name
    devlog
  tradeoff: tests need configuration discipline so imports do not mask packaging issues
  status: accepted
  visibility: public
